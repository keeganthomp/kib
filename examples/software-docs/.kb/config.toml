[provider]
default = "openai"
model = "gpt-4o"
fast_model = "gpt-4o-mini"

[compile]
auto_index = true
auto_graph = true
max_sources_per_pass = 10
categories = ["concepts", "topics", "references", "outputs"]
enrich_cross_refs = true

[search]
engine = "builtin"
max_results = 20

[skills]
[skills.hooks]
post-compile = []
post-ingest = []
post-lint = []
