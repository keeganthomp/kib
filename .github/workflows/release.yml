name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.4.0). Leave blank to use current package.json version."
        type: string
        default: ""
      dry_run:
        description: "Dry run (skip publish & upload)"
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve version
        id: resolve
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump versions if input provided
        if: inputs.version != ''
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          for f in package.json packages/core/package.json packages/cli/package.json; do
            jq --tab --arg v "$VERSION" '.version = $v' "$f" > tmp.json && mv tmp.json "$f"
          done
          bun run check:fix
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json packages/core/package.json packages/cli/package.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump version to $VERSION"
            git push
          fi

      - name: Verify versions are in sync
        run: |
          ROOT=$(jq -r .version package.json)
          CORE=$(jq -r .version packages/core/package.json)
          CLI=$(jq -r .version packages/cli/package.json)
          if [ "$ROOT" != "$CORE" ] || [ "$ROOT" != "$CLI" ]; then
            echo "::error::Version mismatch — root=$ROOT core=$CORE cli=$CLI"
            exit 1
          fi
          echo "All versions in sync: $ROOT"

      - name: Check tag doesn't already exist
        run: |
          TAG="v${{ steps.resolve.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "::error::Tag $TAG already exists. Bump the version before releasing."
            exit 1
          fi

      - name: Lint & format
        run: bun run check

      - name: Test
        run: bun test

  release:
    needs: check
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    outputs:
      tag: v${{ needs.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest (in case version was bumped)
        run: git pull

      - name: Create tag
        run: |
          git tag "v${{ needs.check.outputs.version }}"
          git push origin "v${{ needs.check.outputs.version }}"

      - name: Create GitHub release
        run: |
          gh release create "v${{ needs.check.outputs.version }}" \
            --title "v${{ needs.check.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: [check, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - run: git pull

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish @kibhq/core
        working-directory: packages/core
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @kibhq/cli
        working-directory: packages/cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-binaries:
    needs: [check, release]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: kib-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: kib-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: kib-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: kib-darwin-x64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - run: git pull

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build standalone binary
        run: |
          bun build packages/cli/bin/kib.ts \
            --compile \
            --target=${{ matrix.target }} \
            --outfile=${{ matrix.artifact }}

      - name: Upload binary to release
        run: |
          gh release upload "v${{ needs.check.outputs.version }}" \
            ${{ matrix.artifact }} \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
